<!DOCTYPE html>
<html>

<head>
        <style>
     #solid1{ border-style:solid;
              border-width: 3px;
              border-color:green;}
     #dotted1{ border-top-style:dotted;
               border-bottom-style:dotted;
               border-width:2px;
               border-color:red;}

     #dashed1{ border-style:dashed;
               border-width: 4px 10px 23px 12px;
               border-color:green;}
     #double1{ border: 5px double red;}
     #groove1{ border: 3px groove green;
               border-radius: 10px;}
        </style>

</head>

<body>
        <h2 id="solid1"> I am solid border </h2>
        <h2 id="dotted1"> I am dotted border </h2>
        <h2 id="dashed1"> I am dashed border </h2>
        <h2 id="double1"> I am double border </h2>
        <h2 id="groove1"> I am groove border </h2>
</body>
</html>
